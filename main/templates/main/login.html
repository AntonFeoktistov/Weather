{% extends 'main/base.html' %}

{% block content %}
<div class="login-container">
    <h2>Вход</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Войти</button>
    </form>

    <p>Нет аккаунта? <a href="{% url 'main:register' %}">Зарегистрироваться</a></p>
</div>
{% endblock %}
